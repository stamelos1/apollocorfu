<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apollo Corfu — Employee Handbook 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cypress: #2D4A3E;
  --cypress-mid: #3D6355;
  --cypress-light: #5A8A72;
  --cypress-pale: #EEF4F1;
  --cypress-soft: #D4E6DC;
  --gold: #C4933A;
  --gold-dark: #B8860B;
  --gold-light: #E8BA6A;
  --gold-pale: #FBF5E8;
  --logo-gold: #C9A227;
  --terracotta: #C4663A;
  --terra-pale: #FAF0EB;
  --text: #1C2B24;
  --text-mid: #3D5449;
  --text-light: #7A9B8A;
  --border: #C8DDD3;
  --bg: #F5F8F5;
  --white: #FFFFFF;
  --sidebar-w: 260px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Jost', sans-serif; background: var(--bg); color: var(--text); }

/* ── COVER ── */
.cover {
  min-height: 100vh;
  background: var(--cypress);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 4rem 2rem;
  position: relative; overflow: hidden;
}
.cover::before {
  content: ''; position: absolute;
  width: 700px; height: 700px; border-radius: 50%;
  border: 1px solid rgba(201,162,39,0.12);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none;
}
.cover::after {
  content: ''; position: absolute;
  width: 1000px; height: 1000px; border-radius: 50%;
  border: 1px solid rgba(201,162,39,0.06);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none;
}




.cover-eyebrow {
  font-size: 11px; font-weight: 400;
  color: var(--gold-light); letter-spacing: 0.25em;
  text-transform: uppercase; margin-bottom: 1rem;
  position: relative; z-index: 1;
}
.cover h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 700; color: var(--white);
  line-height: 1.1; letter-spacing: 0.02em; margin-bottom: 0.5rem;
  position: relative; z-index: 1;
}
.cover h1 em { color: var(--gold-light); font-style: italic; font-weight: 400; }
.cover-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem; font-weight: 400; font-style: italic;
  color: var(--gold-light); margin-bottom: 2.5rem;
  position: relative; z-index: 1;
}
.cover-divider {
  display: flex; align-items: center; gap: 12px;
  justify-content: center; margin-bottom: 2.5rem;
  position: relative; z-index: 1;
}
.cover-divider-line { width: 80px; height: 1px; background: var(--gold); opacity: 0.5; }
.cover-divider-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
.cover-meta {
  font-size: 13px; font-weight: 300;
  color: rgba(255,255,255,0.55); letter-spacing: 0.06em; line-height: 2;
  position: relative; z-index: 1;
}
.cover-meta strong { color: rgba(255,255,255,0.8); font-weight: 400; }
.cover-btn {
  margin-top: 3rem; display: inline-block;
  padding: 14px 40px; background: var(--logo-gold);
  color: var(--white); font-family: 'Jost', sans-serif;
  font-size: 13px; font-weight: 500; letter-spacing: 0.12em;
  text-transform: uppercase; border: none; border-radius: 40px;
  cursor: pointer; text-decoration: none; transition: background 0.2s;
  position: relative; z-index: 1;
}
.cover-btn:hover { background: var(--gold-light); color: var(--cypress); }

/* ── MAIN LAYOUT ── */
.main-layout { display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w); background: var(--cypress);
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto; flex-shrink: 0;
  display: flex; flex-direction: column;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(201,162,39,0.3); border-radius: 2px; }
.sidebar-header {
  padding: 1.25rem 1.25rem 0.75rem;
  border-bottom: 1px solid rgba(201,162,39,0.2);
  display: flex; align-items: center; gap: 10px;
}


.sidebar-text-wrap { display: flex; flex-direction: column; gap: 1px; }
.sidebar-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 700; color: var(--white);
}
.sidebar-sub {
  font-size: 9px; font-weight: 300;
  color: var(--gold-light); letter-spacing: 0.12em; text-transform: uppercase;
}
.sidebar-label {
  font-size: 9px; font-weight: 500;
  color: rgba(255,255,255,0.3); letter-spacing: 0.15em;
  text-transform: uppercase; padding: 1rem 1.25rem 0.4rem;
}
.nav-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 8px 1.25rem; cursor: pointer; text-decoration: none;
  border-left: 3px solid transparent; transition: all 0.15s;
}
.nav-item:hover { background: rgba(255,255,255,0.06); border-left-color: rgba(201,162,39,0.4); }
.nav-item.active { background: rgba(201,162,39,0.12); border-left-color: var(--logo-gold); }
.nav-num { font-size: 10px; font-weight: 500; color: var(--logo-gold); min-width: 18px; padding-top: 2px; }
.nav-text { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.75); line-height: 1.4; }
.nav-item.active .nav-text { color: var(--white); font-weight: 500; }
.lang-toggle {
  display: flex; gap: 6px; padding: 1rem 1.25rem;
  margin-top: auto; border-top: 1px solid rgba(201,162,39,0.15);
}
.lang-btn {
  flex: 1; padding: 7px; border: 1px solid rgba(201,162,39,0.4);
  border-radius: 6px; background: transparent; color: var(--gold-light);
  font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; letter-spacing: 0.06em; transition: all 0.15s;
}
.lang-btn.active, .lang-btn:hover { background: var(--logo-gold); color: var(--white); border-color: var(--logo-gold); }

/* ── CONTENT ── */
.content { flex: 1; min-width: 0; padding: 3rem 3.5rem 5rem; max-width: 860px; }

/* ── CHAPTERS ── */
.chapter { display: none; animation: fadeIn 0.3s ease; }
.chapter.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

.chapter-header { margin-bottom: 2.5rem; }
.chapter-num { font-size: 11px; font-weight: 400; color: var(--logo-gold); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; }
.chapter-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem; font-weight: 700; color: var(--cypress);
  line-height: 1.15; letter-spacing: 0.01em; margin-bottom: 6px;
  border-bottom: 2px solid var(--cypress-soft); padding-bottom: 1rem;
}
.chapter-title-gr {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem; font-weight: 400; font-style: italic;
  color: var(--text-light); margin-top: 4px; display: block;
}
h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.45rem; font-weight: 600; color: var(--cypress);
  margin: 2rem 0 0.75rem; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
h3 { font-size: 13px; font-weight: 500; color: var(--cypress-mid); margin: 1.5rem 0 0.5rem; text-transform: uppercase; letter-spacing: 0.08em; }
p { font-size: 14px; font-weight: 300; line-height: 1.85; color: var(--text-mid); margin-bottom: 1rem; }

/* ── BILINGUAL ── */
.bilingual {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin: 1.25rem 0;
}
.lang-en { background: var(--white); padding: 1.25rem 1.5rem; border-right: 1px solid var(--border); }
.lang-gr { background: var(--cypress-pale); padding: 1.25rem 1.5rem; }
.lang-tag { font-size: 9px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-light); margin-bottom: 8px; display: block; }
.lang-en .lang-tag { color: var(--logo-gold); }
.lang-gr .lang-tag { color: var(--cypress-mid); }

/* ── CALLOUTS ── */
.callout { border-radius: 10px; padding: 1.25rem 1.5rem; margin: 1.25rem 0; display: flex; gap: 14px; align-items: flex-start; }
.callout-icon { font-size: 20px; flex-shrink: 0; line-height: 1.4; }
.callout-body { flex: 1; }
.callout-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.callout-text { font-size: 13px; font-weight: 300; line-height: 1.7; color: var(--text-mid); margin: 0; }
.callout.gold { background: var(--gold-pale); border-left: 4px solid var(--logo-gold); }
.callout.gold .callout-title { color: var(--gold-dark); }
.callout.cypress { background: var(--cypress-pale); border-left: 4px solid var(--cypress); }
.callout.cypress .callout-title { color: var(--cypress); }
.callout.terra { background: var(--terra-pale); border-left: 4px solid var(--terracotta); }
.callout.terra .callout-title { color: var(--terracotta); }

/* ── TABLES ── */
.info-table { width: 100%; border-collapse: collapse; margin: 1.25rem 0; }
.info-table th { background: var(--cypress); color: var(--white); font-size: 12px; font-weight: 500; letter-spacing: 0.06em; padding: 10px 14px; text-align: left; }
.info-table td { padding: 10px 14px; font-size: 13.5px; font-weight: 300; color: var(--text-mid); border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.6; }
.info-table tr:nth-child(even) td { background: var(--cypress-pale); }
.info-table tr:last-child td { border-bottom: none; }

/* ── LISTS ── */
ul.handbook-list, ol.handbook-list { margin: 0.75rem 0 1rem; padding-left: 0; list-style: none; }
ul.handbook-list li, ol.handbook-list li {
  font-size: 13.5px; font-weight: 300; color: var(--text-mid);
  line-height: 1.7; padding: 5px 0 5px 22px; position: relative;
  border-bottom: 1px solid var(--cypress-pale);
}
ul.handbook-list li:last-child, ol.handbook-list li:last-child { border-bottom: none; }
ul.handbook-list li::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--logo-gold); position: absolute; left: 0; top: 13px; }
ol.handbook-list { counter-reset: lc; }
ol.handbook-list li { counter-increment: lc; }
ol.handbook-list li::before { content: counter(lc); position: absolute; left: 0; top: 5px; font-size: 11px; font-weight: 500; color: var(--logo-gold); width: 16px; text-align: center; }

/* ── DISCIPLINE ── */
.discipline-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--white); }
.discipline-item:first-child { border-radius: 10px 10px 0 0; }
.discipline-item:last-child { border-radius: 0 0 10px 10px; border-bottom: none; }
.discipline-item:nth-child(even) { background: var(--cypress-pale); }
.disc-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--terracotta); flex-shrink: 0; margin-top: 6px; }
.disc-text { font-size: 13px; font-weight: 300; color: var(--text-mid); line-height: 1.6; }

/* ── STEPS ── */
.steps-list { display: flex; flex-direction: column; gap: 0; margin: 1rem 0; }
.step-item { display: flex; gap: 16px; position: relative; }
.step-item::before { content: ''; position: absolute; left: 15px; top: 32px; width: 2px; height: calc(100% - 16px); background: var(--border); }
.step-item:last-child::before { display: none; }
.step-circle { width: 32px; height: 32px; border-radius: 50%; background: var(--cypress); color: var(--white); font-size: 13px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 4px; z-index: 1; }
.step-body { padding: 4px 0 1.5rem; }
.step-title { font-size: 14px; font-weight: 500; color: var(--cypress); margin-bottom: 3px; }
.step-desc { font-size: 13px; font-weight: 300; color: var(--text-mid); line-height: 1.65; }

/* ── VALUES ── */
.values-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin: 1.5rem 0; }
.value-card { background: var(--white); border: 1px solid var(--border); border-top: 3px solid var(--cypress); border-radius: 10px; padding: 1.25rem; }
.value-card:nth-child(2) { border-top-color: var(--logo-gold); }
.value-card:nth-child(3) { border-top-color: var(--terracotta); }
.value-card:nth-child(4) { border-top-color: var(--cypress-light); }
.value-icon { font-size: 22px; margin-bottom: 8px; display: block; }
.value-title { font-size: 14px; font-weight: 500; color: var(--cypress); margin-bottom: 4px; }
.value-desc { font-size: 12.5px; font-weight: 300; color: var(--text-light); line-height: 1.6; margin: 0; }

/* ── STATS ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin: 1.5rem 0; }
.stat-card { background: var(--cypress); border-radius: 10px; padding: 1.25rem; text-align: center; }
.stat-num { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; color: var(--gold-light); display: block; line-height: 1; margin-bottom: 6px; }
.stat-lbl { font-size: 11px; font-weight: 300; color: rgba(255,255,255,0.65); letter-spacing: 0.06em; }

/* ── WELCOME LETTER ── */
.welcome-letter { background: var(--white); border: 1px solid var(--border); border-top: 4px solid var(--logo-gold); border-radius: 12px; padding: 2.5rem; margin-bottom: 2rem; }
.welcome-letter p { font-size: 14px; line-height: 1.9; }
.welcome-sig { margin-top: 2rem; font-style: italic; color: var(--cypress); }
.welcome-sig strong { font-style: normal; font-family: 'Cormorant Garamond', serif; font-size: 18px; display: block; margin-top: 4px; }

/* ── SIG PAGE ── */
.sig-box { border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-top: 2rem; background: var(--white); }
.sig-field { border-top: 1px solid var(--text); padding-top: 8px; margin-top: 3rem; }
.sig-label { font-size: 12px; color: var(--text-light); letter-spacing: 0.06em; }
.sig-row { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 1rem; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .main-layout { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: static; }
  .content { padding: 2rem 1.25rem 4rem; }
  .bilingual { grid-template-columns: 1fr; }
  .lang-en { border-right: none; border-bottom: 1px solid var(--border); }
  .sig-row { grid-template-columns: 1fr; }
}
@media print {
  .sidebar { display: none; }
  .chapter { display: block !important; page-break-before: always; }
  .content { max-width: 100%; padding: 0; }
}
</style>
</head>
<body>

<!-- COVER -->
<div class="cover" id="cover">
  <div style="height:2rem"></div>
  <p class="cover-eyebrow">Apollo Corfu · Ακτή Μεσογγής, Κέρκυρα</p>
  <h1>Employee <em>Handbook</em></h1>
  <div class="cover-subtitle">Εγχειρίδιο Υπαλλήλων</div>
  <div class="cover-divider">
    <div class="cover-divider-line"></div>
    <div class="cover-divider-dot"></div>
    <div class="cover-divider-line"></div>
  </div>
  <div class="cover-meta">
    <strong>Edition 2 · 2026 Season</strong><br>
    Approved by Philippos Stamelos, General Manager<br>
    Rio Beach S.A. · VAT EL094186780
  </div>
  <button class="cover-btn" onclick="enterHandbook()">Open Handbook &rarr;</button>
</div>

<!-- MAIN -->
<div class="main-layout" id="handbook" style="display:none">

<nav class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-text-wrap">
      <span class="sidebar-logo">Apollo Corfu</span>
      <span class="sidebar-sub">Handbook 2026</span>
    </div>
  </div>
  <div class="sidebar-label">Contents</div>
  <div id="nav-list"></div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-gr" onclick="setLang('gr')">ΕΛ</button>
  </div>
</nav>

<main class="content" id="content-area"></main>
</div>

<script>
const CHAPTERS = [
  {
    id:'welcome', num:'00', en:'Welcome', gr:'Καλωσόρισμα',
    content: () => `
      <div class="chapter-header">
        <div class="chapter-num">Chapter 00</div>
        <div class="chapter-title">Welcome to Apollo Corfu<span class="chapter-title-gr">Καλωσορίσατε στο Apollo Corfu</span></div>
      </div>
      <div class="welcome-letter">
        <p>Dear Team Member,</p>
        <p>It is with great pride and genuine warmth that we welcome you to <strong>Apollo Corfu</strong>. You are joining us at an exciting moment in our history — 2026 marks the beginning of our journey as our own independent brand, carrying forward nearly four decades of hospitality excellence on the beautiful shores of Messonghi, Corfu.</p>
        <p>Since 1987, this hotel has been built on one belief: that the people who work here are our greatest asset. The quality of every guest's experience depends entirely on the dedication, warmth and character of our team. That means you matter — from your very first day to your last shift of the season.</p>
        <p>This handbook has been written to give you everything you need: who we are, how we work, what we expect, and how we will support you in return. Please read it carefully, keep it close, and never hesitate to ask questions.</p>
        <p>We are proud of what we have built here. We invite you to be proud of it too.</p>
        <div class="welcome-sig">
          With warm regards,<br>
          <strong>Philippos Stamelos</strong>
          General Manager, Apollo Corfu
        </div>
      </div>
      <div class="welcome-letter" style="background:var(--cypress-pale);border-top-color:var(--cypress)">
        <p>Αγαπητό Μέλος της Ομάδας μας,</p>
        <p>Με μεγάλη χαρά σας καλωσορίζουμε στο <strong>Apollo Corfu</strong>. Μας βρίσκετε σε μια ιδιαίτερα σημαντική στιγμή — το 2026 σηματοδοτεί την έναρξη της δικής μας ανεξάρτητης πορείας ως brand, φέρνοντας μαζί μας σχεδόν τέσσερις δεκαετίες φιλοξενίας στην υπέροχη ακτή Μεσογγής της Κέρκυρας.</p>
        <p>Από το 1987, αυτό το ξενοδοχείο χτίστηκε πάνω σε μια πεποίθηση: οι άνθρωποί μας είναι το πολυτιμότερο κεφάλαιό μας. Η ποιότητα κάθε εμπειρίας εξαρτάται από την αφοσίωση, τη ζεστασιά και τον χαρακτήρα της ομάδας μας — δηλαδή εσάς.</p>
        <p>Αυτό το εγχειρίδιο δημιουργήθηκε για να σας δώσει όλα όσα χρειάζεστε. Διαβάστε το προσεκτικά και μη διστάσετε να ρωτήσετε οτιδήποτε.</p>
        <div class="welcome-sig" style="color:var(--cypress-mid)">
          Με εκτίμηση,<br>
          <strong>Φίλιππος Σταμέλος</strong>
          Γενικός Διευθυντής, Apollo Corfu
        </div>
      </div>
    `
  },
  {
    id:'identity', num:'01', en:'Who We Are', gr:'Ταυτότητά μας',
    content: () => `
      <div class="chapter-header">
        <div class="chapter-num">Chapter 01</div>
        <div class="chapter-title">Who We Are<span class="chapter-title-gr">Ταυτότητά μας</span></div>
      </div>
      <h2>Our Story · Η Ιστορία μας</h2>
      <div class="bilingual">
        <div class="lang-en"><span class="lang-tag">English</span>
          <p>Apollo Corfu was founded in 1987 on the shores of Messonghi, in the south of Corfu. For nearly four decades, the property has welcomed guests from across Europe, building a reputation for warm Greek hospitality, excellent gastronomy, and a beautiful natural setting surrounded by 33,000m² of gardens, olive trees and the Ionian Sea.</p>
          <p>In 2026, we step forward as our own independent brand — <strong>Apollo Corfu</strong>. In 2027, we will introduce our own new brand identity. We carry forward everything that made this place exceptional, investing in a comprehensive 4-phase renovation programme (currently between phases 2 and 3).</p>
        </div>
        <div class="lang-gr"><span class="lang-tag">Ελληνικά</span>
          <p>Το Apollo Corfu ιδρύθηκε το 1987 στην ακτή Μεσογγής στη νότια Κέρκυρα. Για σχεδόν τέσσερις δεκαετίες φιλοξενεί επισκέπτες από όλη την Ευρώπη, οικοδομώντας φήμη για την ελληνική φιλοξενία, την εξαιρετική γαστρονομία και το φυσικό περιβάλλον με 33.000m² κήπων, ελαιόδεντρα και το Ιόνιο Πέλαγος.</p>
          <p>Το 2026 ξεκινούμε ως ανεξάρτητο brand — <strong>Apollo Corfu</strong>. Το 2027 θα παρουσιάσουμε τη νέα μας brand ταυτότητα. Τρέχουμε 4φασικό πρόγραμμα ανακαίνισης (μεταξύ 2ης και 3ης φάσης).</p>
        </div>
      </div>

      <h2>Key Facts · Βασικά Στοιχεία</h2>
      <div class="stats-grid">
        <div class="stat-card"><span class="stat-num">1987</span><span class="stat-lbl">Year Founded</span></div>
        <div class="stat-card"><span class="stat-num">330</span><span class="stat-lbl">Rooms</span></div>
        <div class="stat-card"><span class="stat-num">45,000</span><span class="stat-lbl">m² Property</span></div>
        <div class="stat-card"><span class="stat-num">5★</span><span class="stat-lbl">Category</span></div>
        <div class="stat-card"><span class="stat-num">4</span><span class="stat-lbl">Restaurants</span></div>

let currentLang = 'en';
let currentChapter = 'welcome';

function enterHandbook() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('handbook').style.display = 'flex';
  buildNav();
  showChapter('welcome');
}

function buildNav() {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = CHAPTERS.map(ch => `
    <a class="nav-item${ch.id === currentChapter ? ' active' : ''}" onclick="showChapter('${ch.id}')" href="javascript:void(0)">
      <span class="nav-num">${ch.num}</span>
      <span class="nav-text">${currentLang === 'en' ? ch.en : ch.gr}</span>
    </a>
  `).join('');
}

function showChapter(id) {
  currentChapter = id;
  const ch = CHAPTERS.find(c => c.id === id);
  document.getElementById('content-area').innerHTML = `<div class="chapter active">${ch.content()}</div>`;
  window.scrollTo(0,0);
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick').includes(`'${id}'`));
  });
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  document.getElementById('btn-gr').classList.toggle('active', lang==='gr');
  buildNav();
}
